<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest Pin Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #e60023, #bd081c);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 300;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        
        .form-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .form-section h3 {
            margin-bottom: 20px;
            color: #333;
            font-size: 1.3rem;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e60023;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .color-input {
            height: 42px !important;
            cursor: pointer;
            padding: 4px !important;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .checkbox-group label {
            margin: 0;
            cursor: pointer;
        }
        
        .range-display {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .range-display input[type="range"] {
            flex: 1;
        }
        
        .range-display span {
            min-width: 50px;
            text-align: right;
            font-weight: 600;
            color: #e60023;
        }
        
        .generate-btn {
            background: linear-gradient(135deg, #e60023, #bd081c);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            width: 100%;
            margin-top: 20px;
        }
        
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(230, 0, 35, 0.3);
        }
        
        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .preview-section {
            text-align: center;
        }
        
        .preview-section h3 {
            margin-bottom: 20px;
            color: #333;
            font-size: 1.3rem;
        }
        
        .preview-container {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #ddd;
        }
        
        .preview-image {
            max-width: 100%;
            max-height: 600px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }
        
        .loading {
            color: #666;
            font-style: italic;
        }
        
        .error {
            color: #e60023;
            background: #fff5f5;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #e60023;
            margin-top: 20px;
        }
        
        .success {
            color: #28a745;
            background: #f0f9f0;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #28a745;
            margin-top: 20px;
        }
        
        .section-divider {
            border: none;
            border-top: 1px solid #e1e5e9;
            margin: 20px 0;
        }
        
        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        
        .title-input-group {
            display: flex;
            gap: 8px;
        }
        
        .title-input-group input {
            flex: 1;
        }
        
        .shorten-btn {
            background: linear-gradient(135deg, #4285f4, #1a73e8);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: transform 0.2s ease;
        }
        
        .shorten-btn:hover {
            transform: translateY(-1px);
        }
        
        .shorten-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .title-preview {
            background: #e8f4e8;
            border: 1px solid #4caf50;
            border-radius: 6px;
            padding: 10px;
            margin-top: 8px;
            font-size: 13px;
        }
        
        .title-preview.original {
            background: #fff3e0;
            border-color: #ff9800;
        }
        
        .title-preview strong {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 4px;
        }
        
        .word-count {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }

        @media (max-width: 900px) {
            .content {
                grid-template-columns: 1fr;
                gap: 20px;
                padding: 20px;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📌 Pinterest Pin Generator</h1>
            <p>Create stunning Pinterest pins with custom text overlays</p>
        </div>
        
        <div class="content">
            <div class="form-section">
                <h3>🎨 Pin Configuration</h3>
                <form id="pinForm">
                    <div class="section-title">Images</div>
                    
                    <div class="form-group">
                        <label for="topImageUrl">Top Image URL</label>
                        <input type="url" id="topImageUrl" placeholder="https://example.com/top-image.jpg" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="bottomImageUrl">Bottom Image URL</label>
                        <input type="url" id="bottomImageUrl" placeholder="https://example.com/bottom-image.jpg" required>
                    </div>
                    
                    <hr class="section-divider">
                    <div class="section-title">Text Content</div>
                    
                    <div class="form-group">
                        <label for="recipeTitle">Pin Title / Text</label>
                        <div class="title-input-group">
                            <input type="text" id="recipeTitle" placeholder="Your Amazing Recipe Title" required>
                            <button type="button" id="shortenBtn" class="shorten-btn">✨ AI Shorten</button>
                        </div>
                        <div class="word-count" id="wordCount">0 words</div>
                        <div id="titlePreview"></div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <div class="checkbox-group">
                                <input type="checkbox" id="autoShorten">
                                <label for="autoShorten">Auto-shorten on generate</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <div class="checkbox-group">
                                <input type="checkbox" id="autoGenerateTags" checked>
                                <label for="autoGenerateTags">🏷️ Auto-generate category tags</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="maxTags">Number of tags</label>
                            <input type="number" id="maxTags" min="1" max="4" value="2">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <div class="checkbox-group">
                                <input type="checkbox" id="showTextOverlay" checked>
                                <label for="showTextOverlay">Show Text Overlay</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="checkbox-group">
                                <input type="checkbox" id="showTextBackground" checked>
                                <label for="showTextBackground">Show Background</label>
                            </div>
                        </div>
                    </div>
                    
                    <hr class="section-divider">
                    <div class="section-title">Typography</div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="fontFamily">Font Family</label>
                            <select id="fontFamily">
                                <option value="Montserrat">Montserrat</option>
                                <option value="Playfair Display">Playfair Display</option>
                                <option value="Lato">Lato</option>
                                <option value="Open Sans">Open Sans</option>
                                <option value="Roboto">Roboto</option>
                                <option value="Geom">Geom</option>
                                <option value="Luckiest Guy">Luckiest Guy</option>
                                <option value="Bebas Neue">Bebas Neue</option>
                                <option value="Yellowtail">Yellowtail</option>
                                <option value="DM Serif Display">DM Serif Display</option>
                                <option value="Merriweather">Merriweather</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="fontWeight">Font Weight</label>
                            <select id="fontWeight">
                                <option value="400">Regular (400)</option>
                                <option value="700" selected>Bold (700)</option>
                                <option value="900">Black (900)</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="fontSize">Font Size</label>
                        <div class="range-display">
                            <input type="range" id="fontSize" min="16" max="120" value="48">
                            <span id="fontSizeValue">48px</span>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="textColor">Text Color</label>
                            <input type="color" id="textColor" value="#ffffff" class="color-input">
                        </div>
                        <div class="form-group">
                            <label for="strokeColor">Stroke Color</label>
                            <input type="color" id="strokeColor" value="#000000" class="color-input">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="strokeWidth">Stroke Width</label>
                        <div class="range-display">
                            <input type="range" id="strokeWidth" min="0" max="12" value="2">
                            <span id="strokeWidthValue">2px</span>
                        </div>
                    </div>
                    
                    <hr class="section-divider">
                    <div class="section-title">Background</div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="backgroundColor">Background Color</label>
                            <input type="color" id="backgroundColor" value="#000000" class="color-input">
                        </div>
                        <div class="form-group">
                            <label for="backgroundOpacity">Opacity</label>
                            <div class="range-display">
                                <input type="range" id="backgroundOpacity" min="0" max="1" step="0.1" value="0.7">
                                <span id="backgroundOpacityValue">70%</span>
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" class="generate-btn" id="generateBtn">
                        🎨 Generate Pinterest Pin
                    </button>
                </form>
                
                <div id="message"></div>
            </div>
            
            <div class="preview-section">
                <h3>📋 Preview</h3>
                <div class="preview-container" id="previewContainer">
                    <p class="loading">Your generated pin will appear here...</p>
                </div>
                
                <button id="downloadBtn" style="display: none; margin-top: 20px;" class="generate-btn">
                    ⬇️ Download Pin
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api';
        let currentImageUrl = null;
        let originalTitle = '';
        let shortenedTitle = '';
        
        // Update word count
        function updateWordCount() {
            const title = document.getElementById('recipeTitle').value;
            const words = title.trim() ? title.trim().split(/\s+/).length : 0;
            const wordCountEl = document.getElementById('wordCount');
            wordCountEl.textContent = `${words} word${words !== 1 ? 's' : ''}`;
            wordCountEl.style.color = words > 6 ? '#e60023' : '#888';
        }
        
        document.getElementById('recipeTitle').addEventListener('input', updateWordCount);
        
        // AI Shorten Title
        document.getElementById('shortenBtn').addEventListener('click', async function() {
            const title = document.getElementById('recipeTitle').value;
            if (!title.trim()) {
                alert('Please enter a title first');
                return;
            }
            
            const btn = this;
            btn.disabled = true;
            btn.textContent = '⏳ Shortening...';
            
            try {
                const response = await fetch(`${API_BASE}/shorten-title`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: title })
                });
                
                const result = await response.json();
                
                if (!response.ok) {
                    throw new Error(result.error || 'Failed to shorten title');
                }
                
                const previewDiv = document.getElementById('titlePreview');
                
                if (result.wasShortened) {
                    originalTitle = result.original;
                    shortenedTitle = result.shortened;
                    
                    previewDiv.innerHTML = `
                        <div class="title-preview original">
                            <strong>Original (${result.original.split(/\s+/).length} words)</strong>
                            ${result.original}
                        </div>
                        <div class="title-preview">
                            <strong>✨ Shortened (${result.wordCount} words)</strong>
                            ${result.shortened}
                            <button type="button" onclick="useShortened()" style="margin-top:8px;padding:5px 10px;background:#4caf50;color:white;border:none;border-radius:4px;cursor:pointer;">Use This</button>
                        </div>
                    `;
                } else {
                    previewDiv.innerHTML = `
                        <div class="title-preview">
                            <strong>✅ Already Short Enough (${result.wordCount} words)</strong>
                            ${result.shortened}
                        </div>
                    `;
                }
                
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '✨ AI Shorten';
            }
        });
        
        // Use shortened title
        window.useShortened = function() {
            if (shortenedTitle) {
                document.getElementById('recipeTitle').value = shortenedTitle;
                updateWordCount();
                document.getElementById('titlePreview').innerHTML = `
                    <div class="title-preview">
                        <strong>✅ Using Shortened Title</strong>
                        ${shortenedTitle}
                    </div>
                `;
            }
        };
        
        // Update display values for range inputs
        document.getElementById('fontSize').addEventListener('input', function() {
            document.getElementById('fontSizeValue').textContent = this.value + 'px';
        });
        
        document.getElementById('strokeWidth').addEventListener('input', function() {
            document.getElementById('strokeWidthValue').textContent = this.value + 'px';
        });
        
        document.getElementById('backgroundOpacity').addEventListener('input', function() {
            document.getElementById('backgroundOpacityValue').textContent = Math.round(this.value * 100) + '%';
        });
        
        // Handle text overlay toggle
        document.getElementById('showTextOverlay').addEventListener('change', function() {
            const textControls = document.querySelectorAll('#fontFamily, #fontWeight, #fontSize, #textColor, #strokeColor, #strokeWidth, #backgroundColor, #backgroundOpacity');
            const recipeTitle = document.getElementById('recipeTitle');
            const showTextBackground = document.getElementById('showTextBackground');
            
            textControls.forEach(control => {
                const formGroup = control.closest('.form-group') || control.closest('.form-row');
                if (formGroup) {
                    formGroup.style.opacity = this.checked ? '1' : '0.5';
                    control.disabled = !this.checked;
                }
            });
            
            showTextBackground.disabled = !this.checked;
            recipeTitle.required = this.checked;
        });
        
        // Form submission
        document.getElementById('pinForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const generateBtn = document.getElementById('generateBtn');
            const messageDiv = document.getElementById('message');
            const previewContainer = document.getElementById('previewContainer');
            const downloadBtn = document.getElementById('downloadBtn');
            
            // Show loading state
            generateBtn.disabled = true;
            generateBtn.textContent = '🔄 Generating...';
            messageDiv.innerHTML = '';
            previewContainer.innerHTML = '<p class="loading">Generating your Pinterest pin...</p>';
            downloadBtn.style.display = 'none';
            
            try {
                const showTextOverlay = document.getElementById('showTextOverlay').checked;
                const showTextBackground = document.getElementById('showTextBackground').checked;
                const autoShorten = document.getElementById('autoShorten').checked;
                const autoGenerateTags = document.getElementById('autoGenerateTags').checked;
                const maxTags = parseInt(document.getElementById('maxTags').value);
                const bgColor = document.getElementById('backgroundColor').value;
                const bgOpacity = document.getElementById('backgroundOpacity').value;
                
                // Convert hex to rgba
                const r = parseInt(bgColor.slice(1, 3), 16);
                const g = parseInt(bgColor.slice(3, 5), 16);
                const b = parseInt(bgColor.slice(5, 7), 16);
                
                const formData = {
                    topImageUrl: document.getElementById('topImageUrl').value,
                    bottomImageUrl: document.getElementById('bottomImageUrl').value,
                    showTextOverlay: showTextOverlay,
                    showTextBackground: showTextBackground,
                    autoShortenTitle: autoShorten,
                    autoGenerateTags: autoGenerateTags,
                    maxTags: maxTags
                };
                
                if (showTextOverlay) {
                    formData.recipeTitle = document.getElementById('recipeTitle').value;
                    formData.textOptions = {
                        fontSize: parseInt(document.getElementById('fontSize').value),
                        fontFamily: document.getElementById('fontFamily').value,
                        fontWeight: document.getElementById('fontWeight').value,
                        textColor: document.getElementById('textColor').value,
                        strokeColor: document.getElementById('strokeColor').value,
                        strokeWidth: parseInt(document.getElementById('strokeWidth').value),
                        backgroundColor: `rgba(${r}, ${g}, ${b}, ${bgOpacity})`
                    };
                }
                
                const response = await fetch(`${API_BASE}/create-pin`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (!response.ok) {
                    throw new Error(result.error || `HTTP error ${response.status}`);
                }
                
                // Display the generated image
                currentImageUrl = result.imageUrl;
                previewContainer.innerHTML = `<img src="${currentImageUrl}" alt="Generated Pinterest Pin" class="preview-image">`;
                
                // Show download button
                downloadBtn.style.display = 'inline-block';
                
                // Show success message with title info
                let titleInfo = '';
                if (result.title && result.title.wasShortened) {
                    titleInfo = `<br><small>Title shortened: "${result.title.used}"</small>`;
                }
                
                messageDiv.innerHTML = `<div class="success">✅ Pin created! Size: ${result.dimensions.width}x${result.dimensions.height}px${titleInfo}</div>`;
                
            } catch (error) {
                console.error('Error:', error);
                messageDiv.innerHTML = `<div class="error">❌ ${error.message}</div>`;
                previewContainer.innerHTML = '<p class="loading">Error generating pin. Please try again.</p>';
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = '🎨 Generate Pinterest Pin';
            }
        });
        
        // Download button
        document.getElementById('downloadBtn').addEventListener('click', async function() {
            if (!currentImageUrl) return;
            
            try {
                const response = await fetch(currentImageUrl);
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = 'pinterest-pin.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (error) {
                console.error('Download error:', error);
            }
        });
        
        // Fill in sample data
        document.getElementById('topImageUrl').value = 'https://picsum.photos/800/600?random=1';
        document.getElementById('bottomImageUrl').value = 'https://picsum.photos/800/600?random=2';
        document.getElementById('recipeTitle').value = 'Crispy Italian Chicken with Garlic Butter Sauce – Simple Chicken Breast Dinner';
        updateWordCount();
    </script>
</body>
</html>
