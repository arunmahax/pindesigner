<!DOCTYPE html>

    <style>

            background: #f8f9fa;
        }
        #status {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
        }
        .loading {
            background: #fff3cd;
            border: 1px solid #ffc107;
        }
        .success {
            background: #d4edda;

</html>
